# project.yml
# XcodeGen configuration for TaskFlow iOS
# Generate the Xcode project by running: xcodegen generate
# Install XcodeGen: brew install xcodegen

name: TaskFlow
options:
  bundleIdPrefix: com.taskflow
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  transitivelyLinkDependencies: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"          # MVP pre-release
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""                # Set to your Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: "YES"
    SWIFT_STRICT_CONCURRENCY: complete  # Enforce Swift 6 concurrency rules
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: "YES"

targets:

  # ─────────────────────────────────────────────
  # Main App Target
  # ─────────────────────────────────────────────
  TaskFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: TaskFlow/Info.plist
      properties:
        CFBundleDisplayName: TaskFlow
        CFBundleIdentifier: com.taskflow.app
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: "TaskFlow uses Face ID to protect your task data."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: TaskFlow/TaskFlow.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers: []   # Populated in v1.0 for CloudKit
        com.apple.developer.icloud-services: []                # CloudKit added in v1.0
    sources:
      - path: TaskFlow
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taskflow.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          else
            echo "warning: SwiftLint not installed. Run: brew install swiftlint"
          fi
        runOnlyWhenInstalling: false

  # ─────────────────────────────────────────────
  # Unit Test Target
  # ─────────────────────────────────────────────
  TaskFlowTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TaskFlowTests
    dependencies:
      - target: TaskFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taskflow.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TaskFlow.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TaskFlow"

  # ─────────────────────────────────────────────
  # UI Test Target
  # ─────────────────────────────────────────────
  TaskFlowUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TaskFlowUITests
    dependencies:
      - target: TaskFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taskflow.uitests
        TEST_TARGET_NAME: TaskFlow

schemes:
  TaskFlow:
    build:
      targets:
        TaskFlow: all
        TaskFlowTests: [test]
        TaskFlowUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TaskFlowTests
        - TaskFlowUITests
      coverageTargets:
        - TaskFlow
    profile:
      config: Release
    archive:
      config: Release
