# .swiftlint.yml
# SwiftLint configuration for TaskFlow iOS
# Install: brew install swiftlint

disabled_rules:
  - trailing_whitespace         # Handled by Xcode editor settings
  - todo                        # TODOs are allowed in MVP development phase

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - convenience_type
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_header
  - first_where
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - modifier_order
  - multiline_parameters
  - nslocalizedstring_key
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - yoda_condition

included:
  - TaskFlow
  - TaskFlowTests
  - TaskFlowUITests

excluded:
  - .build
  - DerivedData
  - Pods
  - vendor

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_comments: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - to
    - vc

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

# Force unwrapping is forbidden outside of tests
force_unwrapping:
  severity: warning
